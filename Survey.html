<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<style>
  :root{--navy:#1B2A4A;--coral:#FF6B5B;--green:#2EB872;--muted:#6B7689;--bg:#F4F6FA;}
  *{box-sizing:border-box;}
  body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;margin:0;background:var(--bg);color:var(--navy);}
  .wrap{max-width:520px;margin:0 auto;padding:26px 18px 48px;}
  .badge{display:inline-block;background:var(--navy);color:#fff;font-size:12px;font-weight:bold;padding:5px 12px;border-radius:20px;letter-spacing:1px;}
  h1{font-size:23px;margin:14px 0 6px;}
  .sub{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:20px;}
  .lock{background:#fff;border-radius:14px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start;margin-bottom:22px;box-shadow:0 4px 14px rgba(27,42,74,.06);}
  .lock b{display:block;font-size:14px;}
  .lock span{color:var(--muted);font-size:13px;}
  label.field{display:block;font-weight:bold;font-size:14.5px;margin:18px 0 8px;}
  textarea{width:100%;border:1.5px solid #D7DEE8;border-radius:12px;padding:13px;font-size:15px;font-family:inherit;resize:vertical;min-height:96px;background:#fff;}
  .cat{display:flex;gap:8px;margin-top:10px;}
  .cat label{flex:1;text-align:center;padding:11px;border:1.5px solid #D7DEE8;border-radius:10px;font-size:14px;cursor:pointer;background:#fff;}
  .cat input{display:none;}
  .cat label.sel{border-color:var(--coral);background:#FFF1EE;color:var(--coral);font-weight:bold;}
  .send{width:100%;background:var(--coral);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:22px;}
  .send:active{opacity:.88;}
  .doneWrap{display:none;text-align:center;background:#fff;border-radius:16px;padding:30px 20px;box-shadow:0 4px 14px rgba(27,42,74,.08);}
  .doneWrap.show{display:block;}
  .doneWrap .ico{width:54px;height:54px;border-radius:50%;background:var(--green);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .doneWrap h2{font-size:18px;margin:0 0 6px;}
  .doneWrap p{color:var(--muted);font-size:14px;margin:0 0 18px;}
  .again{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <span class="badge">사전 의견 수렴 · D-Day 전</span>
  <h1>워크숍 전, 미리 들려주세요</h1>
  <div class="sub">곧 있을 ‘안전 토크 라이브’에서 CSO와 직접 나눌 이야기를 미리 받습니다.<br>당일엔 이 중 일부를 익명으로 공개하고, 다 같이 신호등으로 공감 정도를 표시한 뒤 CSO가 답합니다.</div>

  <div class="lock">
    <div>🔒</div>
    <div><b>완전 익명입니다</b><span>이름·부서를 묻지 않으며, 누가 보냈는지 저장하지 않습니다. 여러 건 보내셔도 됩니다.</span></div>
  </div>

  <div id="form">
    <label class="field">CSO에게 묻고 싶은 것 / 현장에서 바꾸고 싶은 안전 이슈</label>
    <textarea id="opText" placeholder="예) 보고했지만 끝내 바뀌지 않았던 경험이 있나요? / 인력·예산이 늘 부족합니다…"></textarea>

    <label class="field">이 의견의 톤</label>
    <div class="cat" id="cat">
      <label class="sel" data-v="serious"><input type="radio" name="cat" value="serious" checked>진지하게</label>
      <label data-v="light"><input type="radio" name="cat" value="light">가볍게</label>
    </div>

    <button class="send" onclick="send()">익명으로 제출하기</button>
  </div>

  <div class="doneWrap" id="doneWrap">
    <div class="ico">✓</div>
    <h2>잘 받았습니다</h2>
    <p>워크숍 당일, 이 의견이 다뤄질 수도 있어요.<br>더 보내고 싶은 의견이 있다면 계속 적어 주세요.</p>
    <button class="again" onclick="again()">의견 더 보내기</button>
  </div>
</div>

<script>
  var cat = 'serious';
  var labels = document.querySelectorAll('#cat label');
  for (var i = 0; i < labels.length; i++) {
    labels[i].addEventListener('click', function () {
      for (var j = 0; j < labels.length; j++) labels[j].classList.remove('sel');
      this.classList.add('sel');
      this.querySelector('input').checked = true;
      cat = this.getAttribute('data-v');
    });
  }

  function send() {
    var t = document.getElementById('opText').value;
    if (!t.trim()) { alert('내용을 적어 주세요'); return; }
    var btn = document.querySelector('.send');
    btn.disabled = true; btn.textContent = '보내는 중…';
    google.script.run.withSuccessHandler(function (r) {
      btn.disabled = false; btn.textContent = '익명으로 제출하기';
      if (r && r.ok) {
        document.getElementById('form').style.display = 'none';
        document.getElementById('doneWrap').classList.add('show');
      }
    }).submitOpinion(t, cat, 'presurvey');
  }

  function again() {
    document.getElementById('opText').value = '';
    document.getElementById('doneWrap').classList.remove('show');
    document.getElementById('form').style.display = 'block';
  }
</script>
</body>
</html>
