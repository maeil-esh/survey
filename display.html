<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>안전 토크 라이브 · Display</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>window.SAFE_TALK_BUILD_VERSION='20260622-display-stable-current-comments-2';</script>
<style>
  :root{
    --navy:#1B2A4A;
    --panel:#273553;
    --panel2:#303E5F;
    --line:rgba(255,255,255,.08);
    --text:#FFFFFF;
    --sub:#AEB9D1;
    --coral:#FF6B5B;
    --green:#2EB872;
    --amber:#FFC857;
    --red:#E84855;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;min-height:100%;margin:0;overflow:hidden;}
  body{
    font-family:'Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;
    background:var(--navy);
    color:var(--text);
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }
  .screen{
    width:100vw;
    height:100vh;
    min-width:1100px;
    min-height:620px;
    padding:14px 24px 20px;
    display:grid;
    grid-template-rows:42px 138px 258px minmax(120px,1fr);
    gap:10px;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    gap:14px;
    min-height:34px;
    color:var(--sub);
    font-size:15px;
    letter-spacing:-.01em;
  }
  .liveBadge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--coral);
    color:#fff;
    border-radius:999px;
    padding:8px 14px;
    font-size:14px;
    font-weight:900;
    line-height:1;
  }
  .liveDot{
    width:13px;height:13px;border-radius:50%;background:#fff;display:inline-block;
  }
  #statusText{font-weight:600;}
  #setup{position:absolute;left:24px;top:58px;right:24px;z-index:10;}

  .qrBox{
    position:absolute;
    top:14px;
    right:0;
    width:134px;
    height:154px;
    border-radius:14px 0 0 14px;
    background:#fff;
    color:var(--navy);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:7px;
    z-index:4;
    box-shadow:0 10px 26px rgba(0,0,0,.18);
  }
  .qrBox svg{width:90px;height:90px;display:block;}
  .qrLabel{font-size:12px;font-weight:900;color:var(--navy);}

  .questionCard{
    width:calc(100vw - 188px);
    min-width:900px;
    max-width:none;
    border:1px solid var(--line);
    border-radius:18px;
    background:rgba(255,255,255,.055);
    padding:18px 30px;
    display:flex;
    align-items:center;
    overflow:hidden;
  }
  .questionText{
    font-size:clamp(31px,2.05vw,43px);
    line-height:1.22;
    font-weight:900;
    letter-spacing:-.04em;
    word-break:keep-all;
    overflow-wrap:anywhere;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    text-overflow:ellipsis;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .questionText.empty{
    color:rgba(255,255,255,.56);
    font-size:30px;
    font-weight:800;
  }

  .voteArea{
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:22px;
    padding-top:2px;
  }
  .voteRow{
    display:grid;
    grid-template-columns:184px minmax(400px,1fr) 132px;
    align-items:center;
    gap:24px;
    min-height:60px;
  }
  .voteLabel{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:21px;
    font-weight:900;
    letter-spacing:-.03em;
    white-space:nowrap;
    color:#fff;
  }
  .dot{
    width:20px;
    height:20px;
    border-radius:50%;
    flex:0 0 20px;
    box-shadow:0 0 16px currentColor;
  }
  .dot.green{background:var(--green);color:var(--green);}
  .dot.amber{background:var(--amber);color:var(--amber);}
  .dot.red{background:var(--red);color:var(--red);}
  .barTrack{
    height:58px;
    border-radius:14px;
    background:rgba(255,255,255,.09);
    overflow:hidden;
    position:relative;
  }
  .barFill{
    height:100%;
    width:0%;
    border-radius:14px;
    transition:width .35s ease;
    box-shadow:inset -16px 0 24px rgba(255,255,255,.14);
  }
  .barFill.green{background:linear-gradient(90deg,rgba(46,184,114,.95),rgba(76,217,142,.98));}
  .barFill.amber{background:linear-gradient(90deg,rgba(255,200,87,.95),rgba(255,218,105,.98));}
  .barFill.red{background:linear-gradient(90deg,rgba(232,72,85,.96),rgba(255,91,103,.98));}
  .voteValue{
    text-align:right;
    font-size:21px;
    font-weight:900;
    letter-spacing:-.02em;
    white-space:nowrap;
  }

  .comments{
    padding-top:2px;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .commentTitle{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:25px;
    font-weight:900;
    color:var(--coral);
    margin:2px 0 14px;
    letter-spacing:-.03em;
  }
  .commentMeta{
    color:var(--sub);
    font-size:14px;
    font-weight:600;
    margin-left:4px;
  }
  .commentList{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px 12px;
    overflow:hidden;
  }
  .commentItem{
    min-height:44px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.055);
    border-radius:12px;
    padding:10px 14px;
    font-size:18px;
    font-weight:700;
    line-height:1.35;
    letter-spacing:-.02em;
    color:rgba(255,255,255,.92);
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
  }
  .emptyMsg{
    color:var(--sub);
    font-size:16px;
    font-weight:600;
    padding:4px 0;
  }
  .warnMsg{
    color:#FFD6D0;
    font-size:15px;
    font-weight:700;
    padding:8px 0;
  }

  @media (min-width:1500px){
    .screen{grid-template-rows:42px 138px 278px minmax(124px,1fr);}
    .voteArea{gap:26px;}
    .barTrack{height:64px;}
    .voteLabel{font-size:23px;}
    .voteValue{font-size:23px;}
    .questionText{font-size:clamp(34px,2.15vw,46px);}
  }
</style>
</head>
<body>
  <main class="screen">
    <div class="topbar">
      <span class="liveBadge"><span class="liveDot"></span> LIVE</span>
      <span id="statusText">의견 불러오는 중 · 자동 갱신 중</span>
    </div>

    <div id="setup"></div>

    <aside class="qrBox" aria-label="참여 QR">
      <div id="voteQr"></div>
      <div class="qrLabel">참여 QR</div>
    </aside>

    <section class="questionCard">
      <div id="questionText" class="questionText empty">아직 공개된 의견이 없습니다.</div>
    </section>

    <section class="voteArea" aria-label="신호등 응답 현황">
      <div class="voteRow">
        <div class="voteLabel"><span class="dot green"></span>완전 공감</div>
        <div class="barTrack"><div id="barGreen" class="barFill green"></div></div>
        <div id="valGreen" class="voteValue">0표 · 0%</div>
      </div>
      <div class="voteRow">
        <div class="voteLabel"><span class="dot amber"></span>조금 그렇다</div>
        <div class="barTrack"><div id="barAmber" class="barFill amber"></div></div>
        <div id="valAmber" class="voteValue">0표 · 0%</div>
      </div>
      <div class="voteRow">
        <div class="voteLabel"><span class="dot red"></span>다르게 느낀다</div>
        <div class="barTrack"><div id="barRed" class="barFill red"></div></div>
        <div id="valRed" class="voteValue">0표 · 0%</div>
      </div>
    </section>

    <section class="comments" aria-label="실시간 익명 의견">
      <div class="commentTitle">🔒 실시간 익명 의견 <span id="commentMeta" class="commentMeta"></span></div>
      <div id="commentList" class="commentList"><div class="emptyMsg">아직 추가 의견이 없습니다.</div></div>
    </section>
  </main>

<script src="config.js?v=20260622-display-stable-current-comments-2"></script>
<script src="app.js?v=20260622-display-stable-current-comments-2"></script>
<script src="qrlib.js?v=20260622-display-stable-current-comments-2"></script>
<script>
(function(){
  var refreshTimer = null;
  var refreshInFlight = false;
  var lastItemId = '';
  var commentsAction = 'getLiveComments';
  var tallyAction = 'getTallies';

  /* GAS 응답 지연 방지용
     - 상태/집계는 빠르게 갱신
     - 익명 의견은 매번 호출하지 않고 3회 중 1회만 호출
     - getLiveComments가 아직 GAS에 없거나 지연되면 기존 화면을 지우지 않고 조용히 재시도 */
  var refreshSeq = 0;
  var commentsFailCount = 0;
  var commentsHardDisabled = false;
  var lastCommentsByItem = {};
  var lastCommentLoadAt = 0;
  var MIN_DISPLAY_REFRESH_MS = 2600;
  var COMMENT_EVERY_TICKS = 3;

  var CHOICES = [
    {name:'green', keys:['green','agree','full','positive','완전 공감','완전공감','1','g']},
    {name:'amber', keys:['amber','yellow','middle','neutral','maybe','조금 그렇다','조금그렇다','2','y']},
    {name:'red', keys:['red','different','negative','disagree','다르게 느낀다','다르게느낀다','3','r']}
  ];

  function esc(v){
    return String(v == null ? '' : v)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }
  function norm(v){ return String(v == null ? '' : v).trim(); }
  function nnum(v){ var n = Number(v || 0); return isFinite(n) ? n : 0; }
  function pct(n,total){ return total ? Math.round(n / total * 100) : 0; }
  function firstArray(r){
    if (!r) return [];
    if (Array.isArray(r)) return r;
    if (Array.isArray(r.data)) return r.data;
    if (Array.isArray(r.list)) return r.list;
    if (Array.isArray(r.items)) return r.items;
    if (Array.isArray(r.comments)) return r.comments;
    if (r.data && Array.isArray(r.data.list)) return r.data.list;
    if (r.data && Array.isArray(r.data.items)) return r.data.items;
    if (r.data && Array.isArray(r.data.comments)) return r.data.comments;
    return [];
  }

  function boot(){
    if (window.SafeTalk && SafeTalk.showSetupIfNeeded && SafeTalk.showSetupIfNeeded('setup')) return;
    drawQr();
    refreshAll();
    var cfgMs = (SafeTalk.cfg.REFRESH_MS_DISPLAY || SafeTalk.cfg.REFRESH_MS || 3000);
    refreshTimer = setInterval(refreshAll, Math.max(MIN_DISPLAY_REFRESH_MS, cfgMs));
  }

  function drawQr(){
    try{
      var voteUrl = SafeTalk.makePageUrl('index.html');
      if (window.renderQrInto) {
        renderQrInto(document.getElementById('voteQr'), voteUrl, {cell:3, quiet:3, dark:'#1B2A4A'});
      }
    }catch(e){}
  }

  function api(action, params){
    return SafeTalk.api(action, params || {});
  }

  function refreshAll(){
    if (refreshInFlight) return;
    refreshInFlight = true;
    refreshSeq++;

    api('getRevealState').then(function(state){
      state = state || {};
      renderState(state);
      return loadTallies(state).catch(function(){
        renderTallies({green:0, amber:0, red:0});
      }).then(function(){
        var itemChanged = norm(state.itemId || state.id || state.currentId || '') !== lastItemId;
        var shouldLoadComments = itemChanged || refreshSeq === 1 || (refreshSeq % COMMENT_EVERY_TICKS === 0);
        if (shouldLoadComments) return loadCommentsSafe(state);
      });
    }).catch(function(err){
      document.getElementById('statusText').textContent = (SafeTalk.normalizeError ? SafeTalk.normalizeError(err) : err.message || err);
    }).finally(function(){ refreshInFlight = false; });
  }

  function renderState(s){
    var id = norm(s.itemId || s.id || s.currentId || '');
    if (id !== lastItemId) {
      lastItemId = id;
      commentsFailCount = 0;
      renderComments([], s, {mode:'reset'});
      renderTallies({green:0, amber:0, red:0});
    }
    var qt = document.getElementById('questionText');
    var text = norm(s.text || s.question || s.title || '');
    if (id && text) {
      qt.classList.remove('empty');
      qt.textContent = text;
    } else {
      qt.classList.add('empty');
      qt.textContent = '아직 공개된 의견이 없습니다.';
    }
    var idx = s.index || s.currentIndex || 0;
    var total = s.total || 0;
    var openText = s.votingOpen ? '응답 중' : '응답 닫힘';
    document.getElementById('statusText').textContent = id ? ('의견 ' + idx + ' / ' + total + ' · ' + openText + ' · 자동 갱신 중') : '대기 중 · 자동 갱신 중';
  }

  function normalizeTallies(r){
    var src = r && (r.data || r.tallies || r.results || r.counts || r) || {};
    var out = {green:0, amber:0, red:0};
    var arr = Array.isArray(src) ? src : (Array.isArray(src.list) ? src.list : null);
    if (arr) {
      arr.forEach(function(row){
        var key = norm(row.choice || row.key || row.name || row.option || row.answer || row.type).toLowerCase();
        var count = nnum(row.count || row.cnt || row.value || row.votes || row.total);
        CHOICES.forEach(function(c){
          if (c.keys.some(function(k){ return key === String(k).toLowerCase(); })) out[c.name] += count;
        });
      });
      return out;
    }
    CHOICES.forEach(function(c){
      c.keys.forEach(function(k){
        if (src[k] != null) out[c.name] = Math.max(out[c.name], nnum(src[k]));
      });
    });
    return out;
  }

  function loadTallies(state){
    if (!state || !state.itemId) {
      renderTallies({green:0, amber:0, red:0});
      return Promise.resolve();
    }
    return api(tallyAction, {itemId: state.itemId}).then(function(r){
      if (r && r.ok === false && r.error) throw new Error(r.error);
      renderTallies(normalizeTallies(r));
    });
  }

  function renderTallies(t){
    var total = nnum(t.green) + nnum(t.amber) + nnum(t.red);
    setBar('Green', nnum(t.green), total);
    setBar('Amber', nnum(t.amber), total);
    setBar('Red', nnum(t.red), total);
  }
  function setBar(name, count, total){
    var p = pct(count,total);
    document.getElementById('bar' + name).style.width = p + '%';
    document.getElementById('val' + name).textContent = count + '표 · ' + p + '%';
  }

  function getItemField(row){
    var keys = ['itemId','item_id','revealId','reveal_id','curatedId','curated_id','questionId','question_id','targetId','target_id'];
    for (var i=0;i<keys.length;i++) if (row && row[keys[i]] != null && String(row[keys[i]]).trim() !== '') return String(row[keys[i]]).trim();
    return '';
  }
  function getCommentText(row){
    if (typeof row === 'string') return row;
    return norm(row && (row.text || row.comment || row.opinion || row.message || row.content || row.body || row.answer));
  }
  function getCommentTime(row){
    if (!row || typeof row === 'string') return '';
    return norm(row.createdAt || row.created_at || row.timestamp || row.time || row.date || row.submittedAt || row.submitted_at);
  }
  function isMissingCommentApi(err){
    var msg = String((err && (err.message || err.error)) || err || '').toUpperCase();
    return msg.indexOf('UNKNOWN') >= 0 || msg.indexOf('INVALID_ACTION') >= 0 || msg.indexOf('NOT_FOUND') >= 0 || msg.indexOf('NO_ACTION') >= 0 || msg.indexOf('지원') >= 0;
  }

  function loadCommentsSafe(state){
    return loadComments(state).catch(function(err){
      commentsFailCount++;
      if (isMissingCommentApi(err)) commentsHardDisabled = true;
      renderComments(lastCommentsByItem[String(state && state.itemId || '')] || [], state, {
        mode: commentsHardDisabled ? 'disabled' : 'retry',
        failCount: commentsFailCount
      });
    });
  }

  function loadComments(state){
    if (!state || !state.itemId) {
      renderComments([], state, {mode:'empty'});
      return Promise.resolve();
    }
    if (commentsHardDisabled) {
      renderComments([], state, {mode:'disabled'});
      return Promise.resolve();
    }
    return api(commentsAction, {itemId: state.itemId, limit: 12}).then(function(r){
      if (r && r.ok === false && r.error) throw new Error(r.error);
      var list = firstArray(r);
      var hasItemTag = list.some(function(row){ return !!getItemField(row); });
      var filtered;

      if (hasItemTag) {
        filtered = list.filter(function(row){ return getItemField(row) === String(state.itemId); });
      } else if (list.length && (r && (r.filteredByItemId === true || r.itemId === state.itemId || (r.data && r.data.filteredByItemId === true)))) {
        filtered = list;
      } else {
        /* itemId 없는 전체 댓글은 화면에 뿌리지 않음: 현재 의견별 취합 원칙 유지 */
        filtered = [];
        if (list.length) {
          renderComments(filtered, state, {mode:'needItemId'});
          return;
        }
      }

      commentsFailCount = 0;
      lastCommentLoadAt = Date.now();
      lastCommentsByItem[String(state.itemId)] = filtered;
      renderComments(filtered, state, {mode:'ok', hasItemTag:hasItemTag});
    });
  }

  function renderComments(list, state, options){
    options = options || {};
    var el = document.getElementById('commentList');
    var meta = document.getElementById('commentMeta');
    var id = state && state.itemId;
    var clean = (list || []).map(function(row){
      return {text:getCommentText(row), time:getCommentTime(row)};
    }).filter(function(row){ return !!row.text; }).slice(-8).reverse();

    if (!id) {
      meta.textContent = '';
      el.className = 'commentList';
      el.innerHTML = '<div class="emptyMsg">공개된 의견이 생기면 해당 의견의 추가 의견만 표시됩니다.</div>';
      return;
    }

    if (options.mode === 'disabled') {
      meta.textContent = '· GAS 댓글 조회 연동 대기';
      el.className = 'commentList';
      el.innerHTML = '<div class="emptyMsg">익명 의견은 GAS의 getLiveComments 연동 후 현재 의견별로 표시됩니다.</div>';
      return;
    }

    if (options.mode === 'needItemId') {
      meta.textContent = '· 현재 의견별 취합 대기';
      el.className = 'commentList';
      el.innerHTML = '<div class="emptyMsg">전체 댓글은 숨김 처리했습니다. 댓글 저장 시 itemId가 같이 저장되면 이 의견에 해당하는 댓글만 표시됩니다.</div>';
      return;
    }

    if (options.mode === 'retry') {
      meta.textContent = '· 의견 재시도 중';
      if (clean.length) {
        el.className = 'commentList';
        el.innerHTML = clean.map(function(row){
          var title = row.time ? esc(row.time) + ' · ' + esc(row.text) : esc(row.text);
          return '<div class="commentItem" title="' + title + '">' + esc(row.text) + '</div>';
        }).join('');
      } else {
        el.className = 'commentList';
        el.innerHTML = '<div class="emptyMsg">익명 의견을 다시 불러오는 중입니다. 화면은 자동 재시도합니다.</div>';
      }
      return;
    }

    meta.textContent = '· 현재 의견별 취합 ' + clean.length + '건';
    if (!clean.length) {
      el.className = 'commentList';
      el.innerHTML = '<div class="emptyMsg">아직 이 의견에 대한 추가 의견이 없습니다.</div>';
      return;
    }
    el.className = 'commentList';
    el.innerHTML = clean.map(function(row){
      var title = row.time ? esc(row.time) + ' · ' + esc(row.text) : esc(row.text);
      return '<div class="commentItem" title="' + title + '">' + esc(row.text) + '</div>';
    }).join('');
  }

  window.addEventListener('beforeunload', function(){ if (refreshTimer) clearInterval(refreshTimer); });
  boot();
})();
</script>
</body>
</html>
